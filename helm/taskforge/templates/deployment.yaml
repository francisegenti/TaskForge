apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskforge
  labels:
    app: taskforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskforge
  template:
    metadata:
      labels:
        app: taskforge
    spec:
      containers:
        - name: taskforge
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80