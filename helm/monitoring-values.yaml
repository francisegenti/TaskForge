# monitoring-values.yaml
grafana:
  persistence:
    enabled: true
    size: 5Gi

prometheus:
  prometheusSpec:
    retention: 7d
    resources:
      requests:
        cpu: 150m
        memory: 400Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: false

kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: true
